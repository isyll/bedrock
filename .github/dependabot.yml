version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      firebase:
        patterns:
          - firebase_*
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
