name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Run tests
        run: flutter test

  android:
    name: Signed Android bundle
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: verify
    env:
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Android signing secrets are not configured"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
          } > android/key.properties

      - name: Build app bundle
        run: >
          flutter build appbundle --release --flavor prod
          --target lib/main_prod.dart
          --obfuscate --split-debug-info=build/symbols

      - uses: actions/upload-artifact@v7
        with:
          name: app-prod-release
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-symbols
          path: build/symbols
          retention-days: 14

      - name: Distribute to Firebase App Distribution
        if: ${{ env.FIREBASE_APP_ID != '' }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/bundle/prodRelease/app-prod-release.aab

  ios:
    name: Signed iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    needs: verify
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "::error::iOS provisioning profile secret is not configured"
            exit 1
          fi
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILES/prod.mobileprovision"

      - name: Write export options
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: >
          flutter build ipa --release --flavor prod
          --target lib/main_prod.dart
          --obfuscate --split-debug-info=build/symbols
          --export-options-plist ios/ExportOptions.plist

      - uses: actions/upload-artifact@v7
        with:
          name: app-prod-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14

      - name: Upload to App Store Connect
        if: ${{ env.APP_STORE_CONNECT_KEY_ID != '' }}
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEYS="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS"
          echo "$API_KEY_BASE64" | base64 --decode > "$KEYS/AuthKey_$KEY_ID.p8"
          xcrun altool --upload-app --type ios \
            --file "$(ls build/ios/ipa/*.ipa | head -n 1)" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"
