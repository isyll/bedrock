name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Run tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests yet, skipping"
          fi

  build-android:
    name: Build Android (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --flavor dev --target lib/main_dev.dart

      - uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7
