name: bedrock
description: Production-grade Flutter application template for Android and iOS.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cupertino_icons: ^1.0.9
  dio: ^5.10.0
  equatable: ^2.1.0
  file_selector: ^1.0.3
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  get_it: ^9.2.1
  go_router: ^17.3.0
  image_picker: ^1.2.0
  intl: any
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
